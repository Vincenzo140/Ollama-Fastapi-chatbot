# Full stack: Ollama + FastAPI backend + React frontend.
# Run everything with:  docker compose up --build
# Then open http://localhost:8080

services:
  ollama:
    container_name: ollama
    build: ./backend/ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: ["/bin/bash", "-c", "/pull-models.sh"]
    networks:
      - default

  api:
    container_name: chatbot_api
    build: ./backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_MODEL=gemma2:2b
      - SQLITE_PATH=/data/chat.db
      - CORS_ORIGINS=*
    volumes:
      - api-data:/data
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    networks:
      - default

  frontend:
    container_name: chatbot_frontend
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - default

networks:
  default:
    driver: bridge

volumes:
  ollama-models:
    driver: local
  api-data:
    driver: local
